[platformio]
default_envs = lilygo-t-sim7000g

[env:lilygo-t-sim7000g]
platform    = espressif32
board       = esp32dev
framework   = arduino

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    vshymanskyy/TinyGSM @ ^0.11.7
    vshymanskyy/StreamDebugger @ ^1.0.1

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DTINY_GSM_MODEM_SIM7000
    -DTINY_GSM_RX_BUFFER=1024
    ; Load secrets from .env (requires python-dotenv pio hook or manual export)
    !python3 scripts/load_env.py

; Test configuration
[env:native_tests]
platform = native
lib_deps =
    bblanchon/ArduinoJson @ ^7.0
test_build_src = no
