# SMS Gateway — Home Assistant package
#
# Installation:
#   Ajouter dans configuration.yaml :
#     homeassistant:
#       packages:
#         sms_gateway: !include packages/sms_gateway.yaml
#
# Pré-requis : intégration MQTT configurée via Paramètres → Intégrations → MQTT

# ---------------------------------------------------------------------------
# Capteurs MQTT — état de la passerelle
# ---------------------------------------------------------------------------
mqtt:
  sensor:
    - name: "SMS Gateway État"
      unique_id: sms_gateway_state
      state_topic: "sms/status"
      value_template: "{{ value_json.state }}"
      icon: mdi:cellphone-wireless
      availability:
        - topic: "sms/status"
          payload_available: "online"
          payload_not_available: "offline"
          value_template: "{{ value_json.state }}"

    - name: "SMS Gateway RSSI"
      unique_id: sms_gateway_rssi
      state_topic: "sms/status"
      value_template: "{{ value_json.rssi }}"
      unit_of_measurement: "dBm"
      device_class: signal_strength
      state_class: measurement
      icon: mdi:signal
      availability:
        - topic: "sms/status"
          payload_available: "online"
          payload_not_available: "offline"
          value_template: "{{ value_json.state }}"

    - name: "SMS Gateway Uptime"
      unique_id: sms_gateway_uptime
      state_topic: "sms/status"
      value_template: "{{ value_json.uptime_s }}"
      unit_of_measurement: "s"
      icon: mdi:timer-outline
      availability:
        - topic: "sms/status"
          payload_available: "online"
          payload_not_available: "offline"
          value_template: "{{ value_json.state }}"

    - name: "Dernier SMS — Expéditeur"
      unique_id: sms_last_sender
      state_topic: "sms/incoming"
      value_template: "{{ value_json.sender }}"
      icon: mdi:phone-incoming
      availability:
        - topic: "sms/status"
          payload_available: "online"
          payload_not_available: "offline"
          value_template: "{{ value_json.state }}"

    - name: "Dernier SMS — Message"
      unique_id: sms_last_message
      state_topic: "sms/incoming"
      value_template: "{{ value_json.message }}"
      icon: mdi:message-text
      availability:
        - topic: "sms/status"
          payload_available: "online"
          payload_not_available: "offline"
          value_template: "{{ value_json.state }}"

# ---------------------------------------------------------------------------
# Script réutilisable — envoyer un SMS depuis n'importe quelle automation
# ---------------------------------------------------------------------------
script:
  send_sms:
    alias: "Envoyer un SMS"
    description: >-
      Publie sur sms/send pour déclencher l'envoi via la passerelle LilyGO.
      Si recipient est omis, le firmware utilise DEFAULT_RECIPIENT (+32476417968).
    fields:
      recipient:
        description: "Numéro de téléphone (format international) — optionnel, défaut +32476417968"
        example: "+32476417968"
        required: false
        selector:
          text:
      message:
        description: "Texte du SMS (max 160 caractères)"
        example: "Alerte : mouvement détecté !"
        required: true
        selector:
          text:
            multiline: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "sms/send"
          payload: >-
            {"recipient": "{{ recipient | default('+32476417968') }}", "message": "{{ message }}"}
