# Automations — Alertes sécurité et statut système par SMS
#
# Ces automations envoient automatiquement des SMS vers +32476417968
# lorsqu'un événement de sécurité ou un problème système est détecté.
#
# ADAPTER : remplacer les entity_id par vos entités réelles HA.
# Le script send_sms est défini dans packages/sms_gateway.yaml.

# ---------------------------------------------------------------------------
# Alarme intrusion déclenchée
# ---------------------------------------------------------------------------
- id: sms_alert_alarme_intrusion
  alias: "SMS — Alarme intrusion déclenchée"
  description: "Envoie un SMS si la centrale d'alarme se déclenche"
  trigger:
    - platform: state
      entity_id: alarm_control_panel.home   # adapter à votre centrale
      to: "triggered"
  condition:
    - condition: state
      entity_id: sensor.sms_gateway_etat
      state: "online"
  action:
    - action: script.send_sms
      data:
        recipient: "+32476417968"
        message: >-
          🚨 ALARME DÉCLENCHÉE — {{ now().strftime('%d/%m %H:%M') }}
          Zone : {{ state_attr('alarm_control_panel.home', 'open_sensors') | default('inconnue') }}
  mode: single

# ---------------------------------------------------------------------------
# Détection mouvement (hors présence)
# ---------------------------------------------------------------------------
- id: sms_alert_mouvement
  alias: "SMS — Mouvement détecté"
  description: "SMS si mouvement détecté alors que personne n'est censé être là"
  trigger:
    - platform: state
      entity_id: binary_sensor.motion_entree   # adapter
      to: "on"
  condition:
    - condition: state
      entity_id: sensor.sms_gateway_etat
      state: "online"
    - condition: state
      entity_id: alarm_control_panel.home      # seulement si alarme armée
      state: "armed_away"
  action:
    - action: script.send_sms
      data:
        recipient: "+32476417968"
        message: >-
          ⚠️ Mouvement détecté — {{ now().strftime('%d/%m %H:%M') }}
          Capteur : {{ state_attr('binary_sensor.motion_entree', 'friendly_name') }}
  mode: single

# ---------------------------------------------------------------------------
# Porte / fenêtre ouverte (hors horaires)
# ---------------------------------------------------------------------------
- id: sms_alert_porte_ouverte
  alias: "SMS — Porte ouverte hors horaires"
  description: "SMS si une porte est ouverte la nuit ou en absence"
  trigger:
    - platform: state
      entity_id: binary_sensor.porte_entree   # adapter
      to: "on"
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: sensor.sms_gateway_etat
      state: "online"
    - condition: or
      conditions:
        - condition: time
          after: "23:00:00"
          before: "06:00:00"
        - condition: state
          entity_id: alarm_control_panel.home
          state: "armed_away"
  action:
    - action: script.send_sms
      data:
        recipient: "+32476417968"
        message: >-
          🚪 Porte ouverte — {{ now().strftime('%d/%m %H:%M') }}
          {{ state_attr('binary_sensor.porte_entree', 'friendly_name') }} ouverte depuis 2 min.
  mode: single

# ---------------------------------------------------------------------------
# Détection fumée / incendie
# ---------------------------------------------------------------------------
- id: sms_alert_fumee
  alias: "SMS — Détection fumée"
  description: "SMS immédiat si un détecteur de fumée s'active"
  trigger:
    - platform: state
      entity_id: binary_sensor.fumee   # adapter — ou groupe de détecteurs
      to: "on"
  condition:
    - condition: state
      entity_id: sensor.sms_gateway_etat
      state: "online"
  action:
    - action: script.send_sms
      data:
        recipient: "+32476417968"
        message: >-
          🔥 FUMÉE DÉTECTÉE — {{ now().strftime('%d/%m %H:%M') }}
          Vérifier immédiatement.
  mode: single

# ---------------------------------------------------------------------------
# Coupure secteur (sur UPS ou détecteur de coupure)
# ---------------------------------------------------------------------------
- id: sms_alert_coupure_secteur
  alias: "SMS — Coupure secteur"
  description: "SMS si le secteur est coupé et le système tourne sur batterie"
  trigger:
    - platform: state
      entity_id: binary_sensor.ups_on_battery   # adapter
      to: "on"
      for:
        minutes: 1
  condition:
    - condition: state
      entity_id: sensor.sms_gateway_etat
      state: "online"
  action:
    - action: script.send_sms
      data:
        recipient: "+32476417968"
        message: >-
          ⚡ Coupure secteur — {{ now().strftime('%d/%m %H:%M') }}
          Système sur batterie. Vérifier l'alimentation.
  mode: single

# ---------------------------------------------------------------------------
# Passerelle SMS hors ligne (notification HA interne)
# ---------------------------------------------------------------------------
- id: sms_gateway_offline_notify
  alias: "SMS Gateway — Notification hors ligne"
  description: "Notification HA interne si la passerelle passe offline (pas de SMS possible)"
  trigger:
    - platform: state
      entity_id: sensor.sms_gateway_etat
      to: "offline"
      for:
        minutes: 2
  action:
    - action: notify.persistent_notification
      data:
        title: "SMS Gateway hors ligne"
        message: >-
          La passerelle LilyGO ne répond plus depuis 2 minutes.
          Dernier RSSI : {{ states('sensor.sms_gateway_rssi') }} dBm.
  mode: single
