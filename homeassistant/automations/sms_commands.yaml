# Automations — Commandes SMS entrantes
#
# Envoyer un SMS depuis +32476417968 vers la SIM de la gateway (+32456535814)
# pour déclencher une action ou demander un statut.
#
# Seul le numéro +32476417968 est autorisé (condition de sécurité).
#
# Commandes disponibles (insensibles à la casse) :
#   STATUS        → état général du système HA
#   ALARME ON     → armer l'alarme (absent)
#   ALARME OFF    → désarmer l'alarme
#   ALARME NUIT   → armer l'alarme (nuit)

- id: sms_command_dispatcher
  alias: "SMS — Dispatcher commandes entrantes"
  description: "Écoute sms/incoming et exécute la commande reçue"
  trigger:
    - platform: mqtt
      topic: "sms/incoming"
  condition:
    - condition: template
      value_template: >-
        {{ trigger.payload_json.sender in ['+32476417968'] }}
  variables:
    sender: "{{ trigger.payload_json.sender }}"
    cmd: "{{ trigger.payload_json.message | trim | upper }}"
  action:
    - choose:

        # ── STATUS ──────────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: "{{ cmd == 'STATUS' }}"
          sequence:
            - action: script.send_sms
              data:
                recipient: "{{ sender }}"
                message: >-
                  HA {{ now().strftime('%d/%m %H:%M') }}
                  Alarme: {{ states('alarm_control_panel.home') }}
                  Gateway: {{ states('sensor.sms_gateway_rssi') }} dBm
                  Uptime: {{ (states('sensor.sms_gateway_uptime') | int // 3600) }}h

        # ── ALARME ON (absent) ───────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: "{{ cmd == 'ALARME ON' }}"
          sequence:
            - action: alarm_control_panel.alarm_arm_away
              target:
                entity_id: alarm_control_panel.home   # adapter
            - action: script.send_sms
              data:
                recipient: "{{ sender }}"
                message: "✅ Alarme armée (absent) — {{ now().strftime('%H:%M') }}"

        # ── ALARME OFF ───────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: "{{ cmd == 'ALARME OFF' }}"
          sequence:
            - action: alarm_control_panel.alarm_disarm
              target:
                entity_id: alarm_control_panel.home   # adapter
            - action: script.send_sms
              data:
                recipient: "{{ sender }}"
                message: "✅ Alarme désarmée — {{ now().strftime('%H:%M') }}"

        # ── ALARME NUIT ──────────────────────────────────────────────────────
        - conditions:
            - condition: template
              value_template: "{{ cmd == 'ALARME NUIT' }}"
          sequence:
            - action: alarm_control_panel.alarm_arm_night
              target:
                entity_id: alarm_control_panel.home   # adapter
            - action: script.send_sms
              data:
                recipient: "{{ sender }}"
                message: "✅ Alarme armée (nuit) — {{ now().strftime('%H:%M') }}"

        # ── Commande inconnue ────────────────────────────────────────────────
        default:
          - action: script.send_sms
            data:
              recipient: "{{ sender }}"
              message: >-
                Commande inconnue : "{{ trigger.payload_json.message }}"
                Commandes : STATUS | ALARME ON | ALARME OFF | ALARME NUIT

  mode: queued
  max: 5
